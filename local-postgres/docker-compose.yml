# Local PostgreSQL for WattWise — TEST / DEVELOPMENT ONLY.
# Credentials are read from the .env file in this directory.
# Start:  docker compose up -d
# Stop:   docker compose down        (add -v to also delete the data volume)

services:
  postgres:
    image: postgres:16-alpine
    container_name: wattwise-postgres-test
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      # Keeps timezone predictable for tests
      TZ: ${TZ:-Africa/Johannesburg}
      PGTZ: ${TZ:-Africa/Johannesburg}
    ports:
      # host:container — change POSTGRES_PORT in .env if 5432 is already in use
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - wattwise_pgdata:/var/lib/postgresql/data
      # Any .sql / .sh files dropped in ./initdb run once on first startup
      - ./initdb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    shm_size: 128mb

volumes:
  wattwise_pgdata:
    name: wattwise_pgdata
